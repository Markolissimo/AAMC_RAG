version: '3.8'

services:
  mcat-tutor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcat-ai-tutor
    ports:
      - "8501:8501"
    environment:
      # OpenAI API key (required for LLM + embeddings)
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # LlamaCloud API key (required for PDF OCR parsing)
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY}

      # LLM configuration
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}

      # Embedding model (OpenAI text-embedding-3-small only)
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}

      # Chunking configuration
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - TOP_K_RETRIEVAL=${TOP_K_RETRIEVAL:-4}

      # Vector store path
      - VECTOR_STORE_PATH=/app/data/vector_store

    volumes:
      # Persist vector store across container restarts
      - vector_store:/app/data/vector_store

      # Persist evaluation results
      - eval_results:/app/data/eval_results

      # Persist markdown documents (OCR output)
      - docs:/app/docs

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  vector_store:
    driver: local
  eval_results:
    driver: local
  docs:
    driver: local
